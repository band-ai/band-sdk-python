services:
  # Self-hosted Letta server.
  letta-server:
    image: letta/letta:latest
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - |
        python3 - <<'PY'
        from pathlib import Path

        path = Path("/app/letta/helpers/url_validation.py")
        source = path.read_text()
        marker = "# band-compose: MCP URL guard relaxed"
        if marker not in source:
            source += f"""

        {marker}
        def _band_compose_allow_private(url, *args, **kwargs):
            if not url:
                raise ValueError("server_url cannot be empty")
            return url

        validate_mcp_server_url = _band_compose_allow_private
        """
            path.write_text(source)
        PY
        exec ./letta/server/startup.sh
    ports:
      - "8283:8283"
    volumes:
      - letta_data:/var/lib/postgresql/data
    env_file:
      - path: ../../.env
        required: false
      - path: ../../.env.test
        required: false

  # Letta adapter — connects Band platform to Letta agent.
  agent:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: docker/letta/Dockerfile
    env_file:
      - path: ../../.env
        required: false
    environment:
      AGENT_CONFIG: /app/agent_config.yaml
      AGENT_KEY: ${LETTA_AGENT_KEY:-letta_agent}
      LETTA_BASE_URL: http://letta-server:8283
      LETTA_MODE: ${LETTA_MODE:-per_room}
      LETTA_MODEL: ${LETTA_MODEL:-anthropic/claude-haiku-4-5}
      LETTA_EMBEDDING: ${LETTA_EMBEDDING:-openai/text-embedding-3-small}
      # The adapter self-hosts Band MCP in this container. Letta reaches it
      # over the Compose service DNS name, not localhost.
      LETTA_MCP_ADVERTISED_HOST: agent
    volumes:
      - ../../agent_config.yaml:/app/agent_config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - letta-server

# Named volumes persist after `docker compose down`.
# Use `docker compose down -v` to remove them.
volumes:
  letta_data:
