adapter: google_adk
llm_model: gemini-2.5-flash
venv: .venv-google-adk
env_file: examples/google_adk/.env

# Core scenarios (A-C) run per example file
examples:
  working_dir: examples/google_adk
  config_file: examples/google_adk/agent_config.yaml
  items:
    01_basic_agent:
      file: 01_basic_agent.py
      config_key: google_adk_agent
    02_custom_instructions:
      file: 02_custom_instructions.py
      config_key: google_adk_agent
    03_custom_tools:
      file: 03_custom_tools.py
      config_key: google_adk_agent

# Expanded scenarios (E-I) run purpose-built agent scripts
expanded:
  config_file: agent_config.yaml
  scenarios:
    E:
      script: agents/memory_agent.py
      config_key: adk_memory_test
    F1:
      script: agents/contacts_disabled.py
      config_key: adk_contacts_test
    F2:
      script: agents/contacts_callback.py
      config_key: adk_contacts_test
    F3:
      script: agents/contacts_hub.py
      config_key: adk_contacts_test
    G:
      script: agents/full_agent.py
      config_key: adk_full_test
    I:
      script: agents/full_agent.py
      config_key: adk_full_test
  contacts:
    requester_config_key: requester_test
    target_handle: "nir/quickstart"
    user_api_key_env: BAND_API_KEY_USER_NIR
