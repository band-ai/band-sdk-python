adapter: langgraph
llm_model: gpt-4o
env_file: examples/langgraph/.env

# Scenario D: Multi-Participant — two agents in one room
# Uses this adapter's simple example as agent_1, and a second adapter's example as agent_2
multi_participant:
  agent_1:
    adapter: langgraph
    example: 01_simple_agent
    config_key: simple_agent
  agent_2:
    adapter: letta
    example: 01_basic_agent
    config_key: letta_agent

# Core scenarios (A-C) run per example file
examples:
  working_dir: examples/langgraph
  config_file: examples/langgraph/agent_config.yaml
  items:
    01_simple_agent:
      file: 01_simple_agent.py
      config_key: simple_agent
    02_custom_tools:
      file: 02_custom_tools.py
      config_key: simple_agent
    03_custom_personality:
      file: 03_custom_personality.py
      config_key: simple_agent

# Expanded scenarios (E-I) run purpose-built agent scripts
expanded:
  config_file: agent_config.yaml
  scenarios:
    E:
      script: agents/memory_agent.py
      config_key: lg_memory_test
    F1:
      script: agents/contacts_disabled.py
      config_key: lg_contacts_test
    F2:
      script: agents/contacts_callback.py
      config_key: lg_contacts_test
    F3:
      script: agents/contacts_hub.py
      config_key: lg_contacts_test
    G:
      script: agents/full_agent.py
      config_key: lg_full_test
    I:
      script: agents/full_agent.py
      config_key: lg_full_test
  contacts:
    requester_config_key: requester_test
    target_handle: "admin1/lg-contacts-test"
