name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run pre-commit hooks
      run: uv run pre-commit run --all-files


  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
      fail-fast: false

    # Use bash on every OS so these steps stay identical (Git Bash ships on the
    # windows-latest runner). Keeps command substitution / quoting portable.
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run tests
      run: uv run pytest

    - name: Run markdown doc tests
      # Linux-only: doc snippets are OS-independent, and this step relies on
      # git ls-files globbing that we don't need to re-run per platform.
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      # examples/ READMEs have illustrative fragments not yet snippet-testable
      run: uv run pytest --markdown-docs $(git ls-files '*.md' ':!:examples/*') --no-cov


  test-crewai:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
      fail-fast: false

    # Use bash on every OS so the multiline pytest and pyrefly commands stay
    # identical across Linux and Windows.
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install crewai dependencies
      run: uv sync --extra dev-crewai

    - name: Run crewai tests
      env:
        # dev-crewai venv lacks langgraph/anthropic/parlant/pydantic-ai/etc.;
        # tolerate missing framework configs instead of failing fast.
        BAND_ALLOW_MISSING_FRAMEWORKS: "1"
      run: |
        uv run pytest \
          tests/adapters/test_crewai_adapter.py \
          tests/adapters/test_crewai_adapter_soak.py \
          tests/adapters/test_crewai_flow_adapter.py \
          tests/adapters/test_crewai_flow_phase3.py \
          tests/adapters/test_crewai_flow_phase4.py \
          tests/adapters/test_crewai_flow_phase5.py \
          tests/adapters/test_crewai_flow_state_source.py \
          tests/converters/test_crewai.py \
          tests/converters/test_crewai_flow.py \
          tests/integrations/test_crewai_tools.py \
          tests/integrations/test_crewai_flow_real_sdk.py \
          tests/framework_conformance/ -k crewai

    - name: Pyrefly check (crewai sources)
      run: |
        uv run pyrefly check \
          src/band/adapters/crewai.py \
          src/band/adapters/crewai_flow.py \
          src/band/converters/crewai.py \
          src/band/converters/crewai_flow.py \
          src/band/integrations/crewai/


  packaging:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Build wheel
      run: uv build --wheel

    - name: Install from wheel (isolated, no extras)
      run: |
        uv venv /tmp/test-install
        uv pip install dist/*.whl --python /tmp/test-install/bin/python

    - name: Verify core imports (no extras)
      run: |
        /tmp/test-install/bin/python -c "
        from band import Agent, BandLink, AgentRuntime
        from band.config import load_agent_config
        print('Core imports successful')
        "

    - name: Install with all extras
      run: |
        WHEEL=$(ls dist/*.whl)
        uv pip install "${WHEEL}[dev]" --python /tmp/test-install/bin/python

    - name: Verify all imports (with extras)
      run: |
        /tmp/test-install/bin/python -c "
        from band import Agent, BandLink, AgentRuntime
        from band.adapters import LangGraphAdapter, AnthropicAdapter, PydanticAIAdapter, ClaudeSDKAdapter
        from band.converters import LangChainHistoryConverter, AnthropicHistoryConverter, PydanticAIHistoryConverter
        from band.config import load_agent_config
        print('All imports successful')
        "


  # Single aggregate gate for branch protection. Branch rulesets require exactly
  # this one context: `needs` a matrix job is green only when every one of its
  # OS/Python cells passed, so requiring `ci-required` covers the whole matrix and
  # survives future matrix changes without re-editing the ruleset. `if: always()`
  # runs it even when a dependency failed (a skipped/failed dep would otherwise
  # skip this job and report nothing, leaving the required check stuck "Expected").
  ci-required:
    name: ci-required
    needs: [lint, test, test-crewai, packaging]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Fail unless every required job succeeded
      env:
        RESULTS: ${{ needs.lint.result }} ${{ needs.test.result }} ${{ needs.test-crewai.result }} ${{ needs.packaging.result }}
      run: |
        echo "dependency results: ${RESULTS}"
        for result in ${RESULTS}; do
          if [ "${result}" != "success" ]; then
            echo "::error::A required CI job did not succeed (results: ${RESULTS})."
            exit 1
          fi
        done
        echo "All required CI jobs succeeded."
