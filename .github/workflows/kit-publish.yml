# Reusable pipeline that builds, attests, and publishes both band-python-kit
# artifacts to GHCR: the multi-arch sandbox image and the OCI kit artifact whose
# spec pins that image by digest. Shared (workflow_call) by release.yml (on a
# band-sdk release) and kit-image-rebuild.yml (weekly CVE rebuild) so the two
# never drift into separate copies.
#
# NOTE (open verification, see docker/band_python_kit/RELEASING.md): the kit
# artifact is pushed with ORAS assembling the OCI v2 manifest by hand — the
# `sbx` CLI's availability on ubuntu runners is unconfirmed, and the ORAS shape
# is fully specified (artifactType, config media type, single empty layer). A
# push -> pull -> `--kit` roundtrip must be proven once against the pinned CLI
# before the first real release relies on it.
#
# NOTE (action pinning): every action in the kit publish/rebuild workflows is
# pinned to a full commit SHA per GitHub's hardening guidance for
# packages-publishing workflows (tags are movable refs; a SHA is immutable),
# with the human-readable version in a trailing comment that Dependabot/
# Renovate understand when PRing bumps. Pre-existing pins in release.yml's
# release/publish-band jobs (release-please, setup-uv, pypi-publish) are left
# on tags — re-pinning long-standing release infrastructure is a separate
# decision.

name: kit-publish

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out and build from (e.g. band-sdk-vX.Y.Z)
        required: true
        type: string
      version:
        description: Bare artifact/image tag (e.g. 1.2.0 or 1.2.0-r1)
        required: true
        type: string
      major:
        description: Major version for the floating <major> tag (e.g. 1)
        required: true
        type: string
      move-floating:
        description: Also move the `latest` and `<major>` floating tags
        required: false
        default: true
        type: boolean
      extra-build-args:
        description: |
          Newline-separated extra --build-arg entries (e.g. fresh base-image
          digests for a CVE rebuild). Appended after the computed quarantine
          cutoff.
        required: false
        default: ""
        type: string
    outputs:
      image-digest:
        description: Digest of the pushed multi-arch image
        value: ${{ jobs.image.outputs.digest }}
  # The rehearsal path (see RELEASING.md): after this lands on the default
  # branch, dispatch with a throwaway version (e.g. 0.0.0-rc1) to exercise the
  # full build->attest->stamp->push pipeline before the first real release
  # fires it. move-floating defaults to FALSE here — a rehearsal must never
  # move `latest`/<major>. Both trigger types feed the same `inputs` context,
  # so the jobs below are trigger-agnostic.
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to check out and build from (e.g. band-sdk-vX.Y.Z)
        required: true
        type: string
      version:
        description: Bare artifact/image tag (e.g. 0.0.0-rc1 for a rehearsal)
        required: true
        type: string
      major:
        description: Major version for the floating <major> tag (e.g. 1)
        required: true
        type: string
      move-floating:
        description: Also move the `latest` and `<major>` floating tags
        required: false
        default: false
        type: boolean
      extra-build-args:
        description: Newline-separated extra --build-arg entries
        required: false
        default: ""
        type: string

env:
  IMAGE_NAME: ghcr.io/band-ai/band-python-kit/image
  KIT_NAME: ghcr.io/band-ai/band-python-kit

jobs:
  image:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout the release ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          # The trigger is a push to main (not a tag event), so tags are
          # composed from the caller's version input, never derived from the
          # git ref.
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=${{ inputs.major }},enable=${{ inputs.move-floating }}
            type=raw,value=latest,enable=${{ inputs.move-floating }}

      - name: Compute supply-chain quarantine cutoff (now - 7 days)
        id: cutoff
        run: echo "value=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch, attested)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/band_python_kit/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          # The quarantine cutoff fails the build if any locked package is
          # younger than 7 days. Extra args (fresh base digests on a rebuild)
          # follow it.
          build-args: |
            UV_EXCLUDE_NEWER=${{ steps.cutoff.outputs.value }}
            ${{ inputs.extra-build-args }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  kit:
    needs: [image]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the release ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp the distribution spec (image -> digest-pinned ref)
        run: |
          mkdir -p staging
          # --no-project: the helper needs only pyyaml, not the SDK's whole
          # locked environment.
          uv run --no-project --with pyyaml scripts/stamp-kit-spec.py \
            --spec docker/band_python_kit/spec.yaml \
            --image-ref "${IMAGE_NAME}:${{ inputs.version }}" \
            --digest "${{ needs.image.outputs.digest }}" \
            --output staging/spec.yaml
          echo "── stamped sandbox.image ──"
          grep 'image:' staging/spec.yaml

      - name: Assemble the OCI v2 kit artifact
        working-directory: staging
        run: |
          # Our kit ships no files/ (behavioral mixin: network + startup only),
          # but the OCI v2 manifest still requires exactly one layer — an empty
          # tar+gzip, not zero layers.
          tar -czf empty-layer.tar.gz --files-from /dev/null

      - name: Push the kit artifact
        working-directory: staging
        run: |
          # The source annotation is what links the kit package to this repo on
          # GHCR — the image gets linkage from its Dockerfile LABEL, but an
          # ORAS-assembled artifact carries no labels, only manifest
          # annotations.
          oras push "${KIT_NAME}:${{ inputs.version }}" \
            --artifact-type application/vnd.docker.sandbox.kit.v2 \
            --annotation "org.opencontainers.image.source=https://github.com/band-ai/band-sdk-python" \
            --config spec.yaml:application/vnd.docker.sandbox.kit.v2.spec+yaml \
            empty-layer.tar.gz:application/vnd.oci.image.layer.v1.tar+gzip

      - name: Move floating kit tags
        if: ${{ inputs.move-floating }}
        working-directory: staging
        run: |
          oras tag "${KIT_NAME}:${{ inputs.version }}" "${{ inputs.major }}" latest
