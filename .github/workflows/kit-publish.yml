# Reusable pipeline that builds, attests, and publishes both band-python-kit
# artifacts to GHCR: the multi-arch sandbox image and the OCI kit artifact whose
# spec pins that image by digest. Shared (workflow_call) by release.yml (on a
# band-sdk release) and kit-image-rebuild.yml (weekly CVE rebuild) so the two
# never drift into separate copies.
#
# The kit targets sbx v0.35.0 (kit-spec v2 credential injection); `sbx kit
# validate` passes under it. The ORAS-assembled OCI v2 shape and the GHCR
# pull -> `sbx create --kit` roundtrip still need re-validating under 0.35.0
# (last run under v0.34.0) — see RELEASING.md. Revalidate on every sbx upgrade;
# the kit surface is experimental.
#
# NOTE (action pinning): every action in the kit publish/rebuild workflows is
# pinned to a full commit SHA per GitHub's hardening guidance for
# packages-publishing workflows (tags are movable refs; a SHA is immutable),
# with the human-readable version in a trailing comment that Dependabot/
# Renovate understand when PRing bumps.

name: kit-publish

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out and build from (e.g. band-sdk-vX.Y.Z)
        required: true
        type: string
      version:
        description: Bare artifact/image tag (e.g. 1.2.0 or 1.2.0-r1)
        required: true
        type: string
      major:
        description: Major version for the floating <major> tag (e.g. 1)
        required: true
        type: string
      move-floating:
        description: Also move the `latest` and `<major>` floating tags
        required: false
        default: true
        type: boolean
      extra-build-args:
        description: |
          Newline-separated extra --build-arg entries (e.g. fresh base-image
          digests for a CVE rebuild).
        required: false
        default: ""
        type: string
      quarantine-max-age-days:
        description: |
          Minimum public age (days) required of every locked package. Lowering
          it below 7 is the documented emergency override — the value used is
          recorded in the run's inputs.
        required: false
        default: 7
        type: number
    outputs:
      image-digest:
        description: Digest of the pushed multi-arch image
        value: ${{ jobs.image.outputs.digest }}
  # Manual re-publish path: recover a kit artifact for an existing release whose
  # publish failed (e.g. a stale-lock build). Mirrors the workflow_call inputs;
  # `move-floating` defaults false here so re-publishing an old version never
  # disturbs `latest` unless explicitly asked.
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to check out and build from (e.g. band-sdk-vX.Y.Z or main)
        required: true
        type: string
      version:
        description: Bare artifact/image tag to publish (e.g. 1.3.0)
        required: true
        type: string
      major:
        description: Major version for the floating <major> tag (e.g. 1)
        required: true
        type: string
      move-floating:
        description: Also move the `latest` and `<major>` floating tags
        required: false
        default: false
        type: boolean
      relock:
        description: |
          Re-lock uv.lock in the build context before building. Use when
          re-publishing a released tag whose committed lock lags its own
          band-sdk version. Usually only that self-version changes, but
          `uv lock` may also refresh in-range transitive pins — the
          supply-chain quarantine gate still runs afterward and flags any
          newly too-new package.
        required: false
        default: false
        type: boolean
      quarantine-max-age-days:
        description: Minimum public age (days) required of every locked package.
        required: false
        default: "7"
        type: string
      extra-build-args:
        description: Newline-separated extra --build-arg entries.
        required: false
        default: ""
        type: string
env:
  IMAGE_NAME: ghcr.io/band-ai/band-python-kit/image
  KIT_NAME: ghcr.io/band-ai/band-python-kit

jobs:
  image:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout the release ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}

      # Recovery only (manual dispatch with relock=true): a released tag whose
      # committed uv.lock lags its own band-sdk version can't be rebuilt
      # (`uv sync --locked` refuses it). Re-lock the checked-out build context
      # in place before the build — usually just that self-version, though
      # `uv lock` may also refresh in-range transitive pins (the quarantine gate
      # below still vets them).
      - name: Install uv (relock)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.relock }}
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Re-lock the self-version in the build context
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.relock }}
        run: uv lock

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Install ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          # The trigger is a push to main (not a tag event), so tags are
          # composed from the caller's version input, never derived from the
          # git ref.
          tags: type=raw,value=${{ inputs.version }}

      # The gate runs BEFORE the build and reads only the committed lock's
      # recorded upload-times — deterministic, no resolution, no index access.
      # (An in-build `uv sync --exclude-newer` cannot work: the cutoff makes
      # uv treat the committed lock as outdated on every build; proven live,
      # see scripts/check-lock-age.py and RELEASING.md.)
      - name: Supply-chain quarantine gate
        run: python3 scripts/check-lock-age.py --lock uv.lock --max-age-days "${{ inputs.quarantine-max-age-days }}"

      # X.Y.Z / X.Y.Z-rN tags are immutable by policy; the registry does not
      # enforce that, so refuse here. Recovery from a partial publish re-runs
      # only the FAILED jobs (the missing artifact); a full re-run or a
      # mistaken dispatch of an existing version stops at this guard.
      - name: Refuse to overwrite an immutable tag
        run: |
          set -euo pipefail
          state="$(python3 scripts/registry-ref-state.py "${IMAGE_NAME}:${{ inputs.version }}")"
          if [ "$state" = "exists" ]; then
            echo "::error::${IMAGE_NAME}:${{ inputs.version }} already exists and version tags are immutable — re-run only failed jobs, or see RELEASING.md before deliberately deleting a partial tag"
            exit 1
          fi

      - name: Build and push (multi-arch, attested)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/band_python_kit/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          # Extra args carry fresh base digests on a CVE rebuild; empty on a
          # plain release (the committed pins are the defaults).
          build-args: ${{ inputs.extra-build-args }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  kit:
    needs: [image]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the release ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp the distribution spec (image -> digest-pinned ref)
        run: |
          mkdir -p staging
          # --no-project: the helper needs only pyyaml, not the SDK's whole
          # locked environment.
          uv run --no-project --with pyyaml scripts/stamp-kit-spec.py \
            --spec docker/band_python_kit/spec.yaml \
            --image-ref "${IMAGE_NAME}:${{ inputs.version }}" \
            --digest "${{ needs.image.outputs.digest }}" \
            --output staging/spec.yaml
          echo "── stamped sandbox.image ──"
          grep 'image:' staging/spec.yaml

      - name: Assemble the OCI v2 kit artifact
        working-directory: staging
        run: |
          # Our kit ships no files/ (behavioral mixin: network + startup only),
          # but the OCI v2 manifest still requires exactly one layer — an empty
          # tar+gzip, not zero layers.
          tar -czf empty-layer.tar.gz --files-from /dev/null

      - name: Refuse to overwrite an immutable kit tag
        run: |
          set -euo pipefail
          state="$(python3 scripts/registry-ref-state.py "${KIT_NAME}:${{ inputs.version }}")"
          if [ "$state" = "exists" ]; then
            echo "::error::${KIT_NAME}:${{ inputs.version }} already exists and version tags are immutable — re-run only failed jobs, or see RELEASING.md"
            exit 1
          fi

      - name: Push the kit artifact
        working-directory: staging
        run: |
          # The source annotation is what links the kit package to this repo on
          # GHCR — the image gets linkage from its Dockerfile LABEL, but an
          # ORAS-assembled artifact carries no labels, only manifest
          # annotations.
          oras push "${KIT_NAME}:${{ inputs.version }}" \
            --artifact-type application/vnd.docker.sandbox.kit.v2 \
            --annotation "org.opencontainers.image.source=https://github.com/band-ai/band-sdk-python" \
            --config spec.yaml:application/vnd.docker.sandbox.kit.v2.spec+yaml \
            empty-layer.tar.gz:application/vnd.oci.image.layer.v1.tar+gzip

  # Floating tags are the commit point: neither moves until both immutable
  # artifacts exist and the image's GitHub provenance attestation succeeded.
  # The caller-level concurrency lock covers this entire reusable workflow.
  floating:
    needs: [image, kit]
    if: ${{ inputs.move-floating }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the release ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Install ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A queued rebuild can acquire the publish slot after a newer release
      # already published. Re-read main at the commit point and leave floating
      # tags untouched when this immutable version is stale.
      - name: Guard floating tags against stale moves
        id: current
        run: |
          set -euo pipefail
          git fetch --quiet --depth=1 origin main
          current="$(git show FETCH_HEAD:.release-please-manifest.json | python3 -c 'import json,sys; print(json.load(sys.stdin)["."])')"
          base="${{ inputs.version }}"; base="${base%%-r*}"
          move="true"
          if [ "$base" != "$current" ]; then
            echo "::notice::skipping floating tags: publishing ${base} but the current release is ${current}"
            move="false"
          fi
          echo "move=${move}" >> "$GITHUB_OUTPUT"

      - name: Move floating tags after the complete publish
        if: ${{ steps.current.outputs.move == 'true' }}
        run: |
          set -euo pipefail
          image_ref="${IMAGE_NAME}:${{ inputs.version }}"
          kit_ref="${KIT_NAME}:${{ inputs.version }}"

          # Re-verify both immutable sources at the commit point. The helper
          # fails closed on auth/network errors; an unexpected absence is also
          # fatal because the producing jobs already succeeded.
          [ "$(python3 scripts/registry-ref-state.py "$image_ref")" = "exists" ]
          [ "$(python3 scripts/registry-ref-state.py "$kit_ref")" = "exists" ]

          # Move the kit first. If the image retag then fails, kit consumers are
          # still safe because its spec pins the already-published image digest;
          # a re-run idempotently completes the image tags.
          oras tag "$kit_ref" "${{ inputs.major }}" latest
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${{ inputs.major }}" \
            --tag "${IMAGE_NAME}:latest" \
            "$image_ref"
