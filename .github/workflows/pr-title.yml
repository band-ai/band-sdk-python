name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  # Required check must also report on the merge queue's branch, or the queue
  # deadlocks. A merge group has no PR, so the validation step below no-ops and
  # the job reports success.
  merge_group:

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    # Skip validation for bot PRs (dependabot, release-please, etc.)
    if: "!contains(github.actor, '[bot]')"
    steps:
      - name: Validate Conventional Commits format
        # A merge group carries no PR, so there is no title to validate; skip
        # the step there and let the job report success for the required check.
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configure which types are allowed
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Configure which scopes are allowed (optional)
          # Aligned with issue template components
          scopes: |
            sdk
            agent
            api
            websocket
            integrations
            config
            docs
            ci
            release
            perf
            deps
            tests
            examples
          # Require scope to be provided
          requireScope: false
          # Disable validation for merge commits
          ignoreLabels: |
            dependencies
            automated
          # Error message shown when validation fails
          subjectPattern: ^.{1,80}$
          subjectPatternError: |
            PR title must be 80 characters or less.

            Expected format: type(scope): description
            Example: feat(agent): add event streaming support

            See CONTRIBUTING.md for details.
