# Manual entrypoint for the reusable kit publisher. Keeping dispatch here
# (rather than on kit-publish.yml itself) makes manual releases and rehearsals
# participate in the same caller-level concurrency lock as releases/rebuilds.

name: kit-publish-manual

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to check out and build from (e.g. main or a release tag)
        required: true
        type: string
      version:
        description: Immutable artifact tag (e.g. 0.0.0-rc1 or 1.2.3)
        required: true
        type: string
      major:
        description: Major version for the floating tag (e.g. 1)
        required: true
        type: string
      move-floating:
        description: Move latest/major after success (leave false for rehearsals)
        required: false
        default: false
        type: boolean
      extra-build-args:
        description: Newline-separated extra --build-arg entries
        required: false
        default: ""
        type: string
      quarantine-max-age-days:
        description: Minimum public age (days) of every locked package
        required: false
        default: 7
        type: number
      relock:
        description: |
          Re-lock uv.lock before building — recovery for a released tag whose
          committed lock lags its own band-sdk version.
        required: false
        default: false
        type: boolean

  # TEMPORARY — remove before merge. workflow_dispatch is only selectable once a
  # workflow is on the default branch, so a push trigger is the only way to
  # exercise the manual/relock path from this branch. Each push runs a rehearsal
  # (move-floating stays false; the version is a throwaway `0.0.0-ci<run-id>`),
  # so real release tags are never touched.
  push:
    branches:
      - int-981-kit-credential-injection-llm-band-domains-never-in-vm-e2e

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    concurrency:
      group: kit-ghcr-publish
      cancel-in-progress: false
      queue: max
    uses: ./.github/workflows/kit-publish.yml
    with:
      # inputs.* are empty on the temporary push trigger — fall back to a
      # branch-scoped rehearsal there (see the `push:` note above). relock is
      # forced on under push so that path gets exercised; dispatch honors it.
      ref: ${{ inputs.ref || github.ref_name }}
      version: ${{ inputs.version || format('0.0.0-ci{0}', github.run_id) }}
      major: ${{ inputs.major || '0' }}
      move-floating: ${{ inputs.move-floating || false }}
      extra-build-args: ${{ inputs.extra-build-args }}
      quarantine-max-age-days: ${{ inputs.quarantine-max-age-days || 7 }}
      relock: ${{ github.event_name == 'push' && true || inputs.relock }}
