name: E2E (baseline)

# Manually triggered live end-to-end run of the baseline toolkit suite. These
# tests provision real agents against a real Band platform and call real model
# providers, so they are not run on every PR (cost + external state); trigger
# them on demand from the Actions tab.
#
# Lanes are DERIVED FROM THE REGISTRY, not hand-listed here. The `lanes` job
# imports the adapter registry and emits one CI lane per `ci_lanes()` entry; the
# `e2e` job fans out over them. A lane is a job: it installs the lane's `uv` extra
# and (for the backends lane) stands its backends up. Adding an adapter to an
# existing lane needs no edit here.
#
# Lanes today:
# - dev          — the provider-key adapters (anthropic/openai/google families).
# - dev-crewai   — crewai/crewai_flow (crewai conflicts with the dev venv's deps,
#                  so it gets its own `uv` extra; see pyproject [tool.uv] conflicts).
# - backends     — the external-backend adapters in one job (they all use the `dev`
#                  extra): CodexAdapter (codex CLI) + the codex-acp e2e, OpencodeAdapter
#                  (local `opencode serve`, Zen free model), and LettaAdapter (self-hosted
#                  letta Docker, auto-relay — no Band MCP; see settings.py / _build_letta).
#
# An unwired backend still fails loudly (the @requires gate reports the missing
# CLI/server) until its setup block lands. `fail-fast: false`
# keeps a red backend lane from blocking the others.

on:
  workflow_dispatch:

# Serialize E2E runs: they share one live platform, so avoid two runs racing
# (and reaping) each other's provisioned agents/rooms.
concurrency:
  group: e2e-baseline
  cancel-in-progress: false

jobs:

  lanes:
    name: resolve lanes
    runs-on: ubuntu-latest
    outputs:
      lanes: ${{ steps.gen.outputs.lanes }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    # The registry import is framework-free (band.adapters is lazy) and pytest-free,
    # so the default extra is enough to resolve the lane partition.
    - name: Install dependencies
      run: uv sync --extra dev

    - name: Emit lane matrix from the registry
      id: gen
      run: |
        uv run python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        from tests.e2e.baseline.toolkit.adapters import (
            assert_every_adapter_has_a_ci_home,
            assert_registry_covers_discovered,
            assert_workflow_lane_gates_known,
            ci_lanes,
        )
        # Fail before any test runs if the registry or lane partition has drifted.
        assert_registry_covers_discovered()
        assert_every_adapter_has_a_ci_home()
        # Fail if a `matrix.lane ==` gate below names a lane the registry no longer
        # emits (its step would silently never run).
        assert_workflow_lane_gates_known()
        include = [{"lane": lane.id, "extra": lane.extra} for lane in ci_lanes()]
        print("lanes=" + json.dumps({"include": include}))
        PY

  e2e:
    name: e2e (${{ matrix.lane }})
    needs: lanes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.lanes.outputs.lanes) }}
    env:
      E2E_TESTS_ENABLED: "true"
      # The registry scopes which adapters run in this lane.
      BAND_E2E_LANE: ${{ matrix.lane }}
      # The dev-crewai venv lacks the other frameworks; tolerate missing framework
      # configs there instead of failing fast (mirrors ci.yml's crewai job).
      BAND_ALLOW_MISSING_FRAMEWORKS: ${{ matrix.extra == 'dev-crewai' && '1' || '0' }}
      # Band platform (the live target + the driver/observer user key).
      BAND_REST_URL: ${{ secrets.BAND_REST_URL }}
      BAND_WS_URL: ${{ secrets.BAND_WS_URL }}
      BAND_API_KEY_USER: ${{ secrets.BAND_API_KEY_USER }}
      # Optional second user key, for baseline smokes exercising two-user interaction.
      BAND_API_KEY_USER_2: ${{ secrets.BAND_API_KEY_USER_2 }}
      # Model providers (a lane simply ignores a key it has no adapter for).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    # --- Backend setup (only the `backends` lane runs these; they co-run in it) ---

    - name: Set up Node (codex, opencode)
      if: matrix.lane == 'backends'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install + authenticate the Codex CLI (codex)
      if: matrix.lane == 'backends'
      env:
        # Codex picks a model from its own catalogue; gpt-4o-mini (the openai default)
        # is not one of them. Confirm/adjust on first dispatch if model selection errors.
        CODEX_MODEL: gpt-5-codex
      run: |
        npm install -g @openai/codex
        printenv OPENAI_API_KEY | codex login --with-api-key
        codex login status
        # Codex may write to its working dir, so point it at a throwaway path
        # outside the checkout and opt in explicitly (the requirement gate enforces this).
        echo "CODEX_CWD=$(mktemp -d)" >> "$GITHUB_ENV"
        echo "E2E_CODEX_CWD_IS_DISPOSABLE=true" >> "$GITHUB_ENV"
        echo "CODEX_MODEL=${CODEX_MODEL}" >> "$GITHUB_ENV"

    - name: Install + start the OpenCode server (opencode)
      if: matrix.lane == 'backends'
      env:
        # The OpenCode Zen provider key; an unsecured localhost server reads it via
        # the {env:...} substitution in the config below. Free-tier account, so the
        # config pins free models (incl. the small/title model) to avoid paid calls.
        OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
      run: |
        npm install -g opencode-ai
        mkdir -p ~/.config/opencode
        cat > ~/.config/opencode/opencode.json <<'JSON'
        {
          "$schema": "https://opencode.ai/config.json",
          "small_model": "opencode/mimo-v2.5-free",
          "provider": {
            "opencode": { "options": { "apiKey": "{env:OPENCODE_ZEN_API_KEY}" } }
          }
        }
        JSON
        # Serve from an empty throwaway dir: opencode is a coding agent with
        # shell/read/grep tools, so in the repo checkout a weak free model wanders
        # into the source instead of replying. An empty cwd keeps it on task.
        workdir="$(mktemp -d)"
        ( cd "$workdir" && nohup opencode serve --hostname 127.0.0.1 --port 4096 \
            >/tmp/opencode-serve.log 2>&1 & )
        for _ in $(seq 1 30); do
          curl -fsS http://127.0.0.1:4096/global/health && break
          sleep 2
        done
        echo "OPENCODE_BASE_URL=http://127.0.0.1:4096" >> "$GITHUB_ENV"
        # Free Zen models are slower than the 60s default; give the turn room.
        echo "E2E_TIMEOUT=120" >> "$GITHUB_ENV"

    - name: Start the self-hosted Letta server (letta)
      if: matrix.lane == 'backends'
      run: |
        # Auto-relay mode: the adapter registers NO Band MCP server (a self-hosted
        # Letta rejects a loopback/private-IP MCP URL via its SSRF guard, and stdio
        # MCP isn't registrable via its API), so the adapter relays the model's
        # reply to the room itself. That means no MCP server, no --network host, no
        # tunnel — just a plain Letta server reachable on :8283. Letta uses
        # OPENAI_API_KEY for its model (the openai/gpt-4o-mini default); no new secret.
        docker run -d --name letta -p 8283:8283 \
          -e OPENAI_API_KEY="${OPENAI_API_KEY}" letta/letta:latest
        for _ in $(seq 1 60); do
          curl -fsS http://localhost:8283/v1/health/ && break
          sleep 2
        done
        # Self-hosted base_url makes the Letta requirement available with no cloud key.
        echo "LETTA_BASE_URL=http://localhost:8283" >> "$GITHUB_ENV"
        # Letta runs server-side; give the turn a little more room than the default.
        echo "E2E_TIMEOUT=120" >> "$GITHUB_ENV"

    # -----------------------------------------------------------------------------

    - name: Install dependencies (${{ matrix.extra }})
      run: uv sync --extra ${{ matrix.extra }}

    - name: Run baseline E2E (lane ${{ matrix.lane }})
      run: uv run pytest tests/e2e/baseline/ -v -s --no-cov

    # The backends lane also exercises the editor-facing ACP path (codex-acp via npx).
    # It uses the same ~/.codex login and a local MCP server — no Band platform.
    - name: Run codex-acp e2e (codex)
      if: matrix.lane == 'backends'
      run: uv run pytest tests/integrations/acp/test_e2e_codex_acp.py -v --no-cov
