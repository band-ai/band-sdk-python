name: E2E (baseline)

# Manually triggered live end-to-end run of the baseline toolkit suite. These
# tests provision real agents against a real Band platform and call real model
# providers, so they are not run on every PR (cost + external state); trigger
# them on demand from the Actions tab.
#
# Lanes are DERIVED FROM THE REGISTRY, not hand-listed here. The `lanes` job
# imports the adapter registry and emits one CI lane per `ci_lanes()` entry; the
# `e2e` job fans out over them. A lane is a job: it installs the lane's `uv` extra
# and (for a backend lane) stands its backend up. Adding an adapter to an existing
# lane needs no edit here — only a brand-new backend lane adds a setup block.
#
# Lanes today:
# - dev          — the provider-key adapters (anthropic/openai/google families).
# - dev-crewai   — crewai/crewai_flow (crewai conflicts with the dev venv's deps,
#                  so it gets its own `uv` extra; see pyproject [tool.uv] conflicts).
# - codex        — CodexAdapter (codex CLI) + the codex-acp e2e. [wired]
# - opencode     — OpencodeAdapter against a local `opencode serve`. [TODO: phase 2]
# - letta        — LettaAdapter against a self-hosted letta + Band MCP. [TODO: phase 3]
#
# An unwired backend lane still runs: its cell fails loudly (the @requires gate
# reports the missing CLI/server) until its setup block lands. `fail-fast: false`
# keeps a red backend lane from blocking the others.

on:
  workflow_dispatch:

# Serialize E2E runs: they share one live platform, so avoid two runs racing
# (and reaping) each other's provisioned agents/rooms.
concurrency:
  group: e2e-baseline
  cancel-in-progress: false

jobs:

  lanes:
    name: resolve lanes
    runs-on: ubuntu-latest
    outputs:
      lanes: ${{ steps.gen.outputs.lanes }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    # The registry import is framework-free (band.adapters is lazy) and pytest-free,
    # so the default extra is enough to resolve the lane partition.
    - name: Install dependencies
      run: uv sync --extra dev

    - name: Emit lane matrix from the registry
      id: gen
      run: |
        uv run python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        from tests.e2e.baseline.toolkit.adapters import (
            assert_every_adapter_has_a_ci_home,
            assert_registry_covers_discovered,
            ci_lanes,
        )
        # Fail before any test runs if the registry or lane partition has drifted.
        assert_registry_covers_discovered()
        assert_every_adapter_has_a_ci_home()
        include = [{"lane": lane.id, "extra": lane.extra} for lane in ci_lanes()]
        print("lanes=" + json.dumps({"include": include}))
        PY

  e2e:
    name: e2e (${{ matrix.lane }})
    needs: lanes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.lanes.outputs.lanes) }}
    env:
      E2E_TESTS_ENABLED: "true"
      # The registry scopes which adapters run in this lane.
      BAND_E2E_LANE: ${{ matrix.lane }}
      # The dev-crewai venv lacks the other frameworks; tolerate missing framework
      # configs there instead of failing fast (mirrors ci.yml's crewai job).
      BAND_ALLOW_MISSING_FRAMEWORKS: ${{ matrix.extra == 'dev-crewai' && '1' || '0' }}
      # Band platform (the live target + the driver/observer user key).
      BAND_REST_URL: ${{ secrets.BAND_REST_URL }}
      BAND_WS_URL: ${{ secrets.BAND_WS_URL }}
      BAND_API_KEY_USER: ${{ secrets.BAND_API_KEY_USER }}
      # Model providers (a lane simply ignores a key it has no adapter for).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    # --- Backend setup (per lane; only the matching lane's block runs) -----------

    - name: Set up Node (codex)
      if: matrix.lane == 'codex'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install + authenticate the Codex CLI (codex)
      if: matrix.lane == 'codex'
      env:
        # Codex picks a model from its own catalogue; gpt-4o-mini (the openai default)
        # is not one of them. Confirm/adjust on first dispatch if model selection errors.
        CODEX_MODEL: gpt-5-codex
      run: |
        npm install -g @openai/codex
        printenv OPENAI_API_KEY | codex login --with-api-key
        codex login status
        # Codex may write to its working dir, so point it at a throwaway path
        # outside the checkout and opt in explicitly (the requirement gate enforces this).
        echo "CODEX_CWD=$(mktemp -d)" >> "$GITHUB_ENV"
        echo "E2E_CODEX_CWD_IS_DISPOSABLE=true" >> "$GITHUB_ENV"
        echo "CODEX_MODEL=${CODEX_MODEL}" >> "$GITHUB_ENV"

    # -----------------------------------------------------------------------------

    - name: Install dependencies (${{ matrix.extra }})
      run: uv sync --extra ${{ matrix.extra }}

    - name: Run baseline E2E (lane ${{ matrix.lane }})
      run: uv run pytest tests/e2e/baseline/ -v -s --no-cov

    # The codex lane also exercises the editor-facing ACP path (codex-acp via npx).
    # It uses the same ~/.codex login and a local MCP server — no Band platform.
    - name: Run codex-acp e2e (codex)
      if: matrix.lane == 'codex'
      run: uv run pytest tests/integrations/acp/test_e2e_codex_acp.py -v --no-cov
