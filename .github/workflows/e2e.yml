name: E2E (baseline)

# Manually triggered live end-to-end run of the baseline toolkit suite. These
# tests provision real agents against a real Band platform and call real model
# providers, so they are not run on every PR (cost + external state); trigger
# them on demand from the Actions tab.
#
# Lanes are DERIVED FROM THE REGISTRY, not hand-listed here. The `lanes` job
# imports the adapter registry and emits one CI lane per `uv` extra
# (`ci_lanes()`); the `e2e` job fans out over them. This is why adding a new
# adapter — or even a whole new conflicting-deps venv lane — needs no edit to this
# file: a newly-registered adapter lands in its lane automatically, and the
# drift guard (`assert_every_adapter_has_a_ci_home`) fails the `lanes` job if any
# adapter is left unplaced.
#
# Why lanes exist at all:
# - crewai 1.14.3 conflicts with parlant/pydantic-ai (pydantic + opentelemetry
#   pins — see pyproject.toml [tool.uv] conflicts), so crewai-family adapters get
#   their own venv (`uv sync --extra dev-crewai`), like the unit `test` /
#   `test-crewai` split in ci.yml.
# - The baseline matrix is fail-loud: a cell whose requirement is absent FAILS.
#   So each lane runs the full suite but `BAND_E2E_LANE` makes out-of-lane and
#   infra (codex/opencode/letta) adapters SKIP-with-reason; an in-lane adapter
#   whose provider key is missing still fails (misconfig stays loud).
#
# Backend adapters (codex/opencode/letta) are classified INFRA and excluded from
# every lane until a backend is wired; folding one in is a registry change
# (reclassify its Dep / add its extra), not a YAML edit.

on:
  workflow_dispatch:

# Serialize E2E runs: they share one live platform, so avoid two runs racing
# (and reaping) each other's provisioned agents/rooms.
concurrency:
  group: e2e-baseline
  cancel-in-progress: false

jobs:

  lanes:
    name: resolve lanes
    runs-on: ubuntu-latest
    outputs:
      lanes: ${{ steps.gen.outputs.lanes }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    # The registry import is framework-free (band.adapters is lazy) and pytest-free,
    # so the default extra is enough to resolve the lane partition.
    - name: Install dependencies
      run: uv sync --extra dev

    - name: Emit lane matrix from the registry
      id: gen
      run: |
        uv run python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        from tests.e2e.baseline.toolkit.adapters import (
            assert_every_adapter_has_a_ci_home,
            assert_registry_covers_discovered,
            ci_lanes,
        )
        # Fail before any test runs if the registry or lane partition has drifted.
        assert_registry_covers_discovered()
        assert_every_adapter_has_a_ci_home()
        include = [{"lane": extra, "extra": extra} for extra in ci_lanes()]
        print("lanes=" + json.dumps({"include": include}))
        PY

  e2e:
    name: e2e (${{ matrix.lane }})
    needs: lanes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.lanes.outputs.lanes) }}
    env:
      E2E_TESTS_ENABLED: "true"
      # The lane = the uv extra; the registry scopes which adapters run.
      BAND_E2E_LANE: ${{ matrix.lane }}
      # The dev-crewai venv lacks the other frameworks; tolerate missing framework
      # configs there instead of failing fast (mirrors ci.yml's crewai job).
      BAND_ALLOW_MISSING_FRAMEWORKS: ${{ matrix.extra == 'dev-crewai' && '1' || '0' }}
      # Band platform (the live target + the driver/observer user key).
      BAND_REST_URL: ${{ secrets.BAND_REST_URL }}
      BAND_WS_URL: ${{ secrets.BAND_WS_URL }}
      BAND_API_KEY_USER: ${{ secrets.BAND_API_KEY_USER }}
      # Model providers (a lane simply ignores a key it has no adapter for).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Configure git to use HTTPS for GitHub
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies (${{ matrix.extra }})
      run: uv sync --extra ${{ matrix.extra }}

    - name: Run baseline E2E (lane ${{ matrix.lane }})
      run: uv run pytest tests/e2e/baseline/ -v -s --no-cov
