name: Band baseline L3 live

on:
  workflow_dispatch:
  schedule:
    - cron: '23 10 * * *'

jobs:
  baseline-l3-live:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      E2E_TESTS_ENABLED: "true"
      E2E_BASELINE_L3_LIVE: "true"
      E2E_BASELINE_RUN_ID: ${{ github.run_id }}
      E2E_BASELINE_ARTIFACT_DIR: .claude/reports/e2e-baseline-artifacts
      THENVOI_BASE_URL: ${{ vars.THENVOI_BASE_URL }}
      THENVOI_WS_URL: ${{ vars.THENVOI_WS_URL }}
      TEST_AGENT_ID: ${{ secrets.E2E_L3_TEST_AGENT_ID }}
      THENVOI_API_KEY: ${{ secrets.E2E_L3_TEST_AGENT_API_KEY }}
      THENVOI_API_KEY_USER: ${{ secrets.THENVOI_API_KEY_USER }}
      E2E_L3_TEST_AGENT_ID: ${{ secrets.E2E_L3_TEST_AGENT_ID }}
      E2E_L3_TEST_AGENT_API_KEY: ${{ secrets.E2E_L3_TEST_AGENT_API_KEY }}
      E2E_L3_TEST_AGENT_NAME: ${{ vars.E2E_L3_TEST_AGENT_NAME }}
      E2E_L3_TEST_AGENT_HANDLE: ${{ vars.E2E_L3_TEST_AGENT_HANDLE }}
      E2E_L3_TEST_AGENT_DESCRIPTION: ${{ vars.E2E_L3_TEST_AGENT_DESCRIPTION }}
      E2E_L3_CALC_AGENT_ID: ${{ secrets.E2E_L3_CALC_AGENT_ID }}
      E2E_L3_CALC_AGENT_API_KEY: ${{ secrets.E2E_L3_CALC_AGENT_API_KEY }}
      E2E_L3_CALC_AGENT_NAME: ${{ vars.E2E_L3_CALC_AGENT_NAME }}
      E2E_L3_CALC_AGENT_HANDLE: ${{ vars.E2E_L3_CALC_AGENT_HANDLE }}
      E2E_L3_CALC_AGENT_DESCRIPTION: ${{ vars.E2E_L3_CALC_AGENT_DESCRIPTION }}
      E2E_L3_GREETER_AGENT_ID: ${{ secrets.E2E_L3_GREETER_AGENT_ID }}
      E2E_L3_GREETER_AGENT_API_KEY: ${{ secrets.E2E_L3_GREETER_AGENT_API_KEY }}
      E2E_L3_GREETER_AGENT_NAME: ${{ vars.E2E_L3_GREETER_AGENT_NAME }}
      E2E_L3_GREETER_AGENT_HANDLE: ${{ vars.E2E_L3_GREETER_AGENT_HANDLE }}
      E2E_L3_GREETER_AGENT_DESCRIPTION: ${{ vars.E2E_L3_GREETER_AGENT_DESCRIPTION }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_GENAI_USE_VERTEXAI: ${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}
      GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT }}
      E2E_BASELINE_INPUT_USD_PER_MILLION_TOKENS: ${{ vars.E2E_BASELINE_INPUT_USD_PER_MILLION_TOKENS }}
      E2E_BASELINE_OUTPUT_USD_PER_MILLION_TOKENS: ${{ vars.E2E_BASELINE_OUTPUT_USD_PER_MILLION_TOKENS }}
      E2E_BASELINE_PRICING_SOURCE: ${{ vars.E2E_BASELINE_PRICING_SOURCE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run live L3 baseline scenario
        run: uv run pytest tests/e2e/scenarios/test_baseline_l3_multiparty.py -v -s --no-cov

      - name: Require complete live L3 artifact matrix
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          expected = {
              'anthropic', 'claude_sdk', 'codex', 'crewai', 'crewai_flow',
              'gemini', 'google_adk', 'langgraph', 'letta', 'opencode',
              'parlant', 'pydantic_ai',
          }
          artifact_dir = Path('.claude/reports/e2e-baseline-artifacts')
          artifacts = [json.loads(path.read_text()) for path in artifact_dir.glob('*.json')]
          level_artifacts = [artifact for artifact in artifacts if artifact.get('level') == 'L3']
          adapters = {artifact.get('adapter') for artifact in level_artifacts}
          missing = expected - adapters
          if missing:
              raise SystemExit('Missing live L3 artifact disposition for: ' + ', '.join(sorted(missing)))
          if not any(artifact.get('status') != 'TIER2_BLOCKED' for artifact in level_artifacts):
              raise SystemExit('No successful live L3 artifact was produced')
          PY

      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: baseline-l3-live-artifacts
          path: .claude/reports/e2e-baseline-artifacts/*.json
          if-no-files-found: warn
