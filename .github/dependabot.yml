version: 2
updates:
  # Python dependencies (uv)
  - package-ecosystem: "uv"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "band/integrations-team"

  # GitHub Actions. Dependabot resolves SHA-pinned actions (the kit publish
  # workflows pin full commit SHAs with a trailing version comment) the same
  # as tag pins, and updates both the hash and the comment in its PRs.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
    # One combined weekly PR instead of a PR per action — keeps the SHA-pin
    # maintenance to a single review.
    groups:
      github-actions:
        patterns:
          - "*"
