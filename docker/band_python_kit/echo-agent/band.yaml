schemaVersion: "1"

agent:
  id: replace-with-agent-id
  entrypoint: main.py

# Production endpoints. For another Band deployment (e.g. dev), override
# here or via BAND_REST_URL / BAND_WS_URL, and grant the host to the sandbox:
#   sbx policy allow network --sandbox <name> <host>
band:
  restUrl: https://app.band.ai
  wsUrl: wss://app.band.ai/api/v1/socket/websocket

project:
  path: .

# Optional: materialize the project from Git instead of shipping it in the
# workspace. The repository is cloned into project.path at startup (before
# dependency sync), so set project.path to a subdirectory (e.g. `app`) —
# the workspace root holds this file. On restart an existing checkout is
# validated and reused, never re-cloned. HTTPS URLs are the sandbox path
# (SSH needs ~/.ssh, which sandboxes don't mount); non-GitHub hosts need
# `sbx policy allow network`.
# repo:
#   url: https://github.com/your-org/your-agent-project.git
#   branch: main    # optional
#   index: false    # optional: write context index files under statePath

# Credential custody. Default: proxy-managed — the real keys stay on the host
# (provisioned with `sbx secret`; see the kit README) and the VM sees only a
# sentinel. Nothing else to declare here.
credentials:
  source: proxy-managed

# Fallback tier (laptop-equivalent, LESS SECURE): a plaintext dotenv file whose
# keys live in both the workspace and the sandbox VM; the launcher warns when
# it's used. To opt in, replace the block above with:
#   credentials:
#     source: workspace-env-file
#     path: .band/secrets.env
#     acknowledgePlaintextInSandbox: true
# Create the file from secrets.env.example (gitignored, chmod 600).

# Sandbox-owned storage: must live outside the mounted workspace (a direct
# mount is the host directory — a Linux venv written there would pollute the
# host) and outside the immutable SDK venv.
runtime:
  environmentPath: /home/agent/.local/share/band-kit/venv
  statePath: /home/agent/.local/share/band-kit/state
  cachePath: /home/agent/.local/share/band-kit/cache
  logPath: /home/agent/.local/share/band-kit/logs
