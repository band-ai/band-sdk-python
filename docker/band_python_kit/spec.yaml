# schemaVersion "2" selects sbx's OCI v2 kit artifact format (tar+gzip layer,
# spec in the manifest config blob, standard OCI annotations) for
# `sbx kit push`, with v0.35.0's streaming/caching support. It changes only
# the packaging on push — no spec-field differences from "1" — and passes
# `sbx kit validate` unchanged on the pinned CLI.
schemaVersion: "2"
kind: sandbox
name: band-python-kit
displayName: Band Python Agent
description: Run a workspace Python agent on Band inside a Docker Sandbox.

sandbox:
  image: band-python-kit:local
  aiFilename: AGENTS.md

# The agent launches headlessly at every sandbox start (no attach needed):
# the startup command chains through the base image entrypoint (proxy-CA
# refresh as root, then a setpriv drop to uid 1000) into the SDK launcher,
# which syncs the workspace's locked dependencies into a sandbox-owned venv
# and execs the configured customer entrypoint. Startup runs are idempotent;
# output lands in /var/log/sbx-kit-startup.log inside the sandbox.
# Paths below assume the image's default layout (BAND_SDK_HOME=/opt/band);
# a build that overrides --build-arg BAND_SDK_HOME needs a matching kit.
commands:
  startup:
    - command:
        - /usr/local/bin/band-entrypoint.sh
        - /opt/band/venv/bin/python
        - -m
        - band.docker.launcher
      user: "0"
      background: true
      description: Launch the Band agent

# The immutable baseline: Band Cloud and locked dependency sync. `uv sync
# --locked` still downloads the already-selected package artifacts, so both
# PyPI hosts are needed on a fresh sandbox. LLM providers, source hosts, and
# non-production Band deployments are opt-in per sandbox with
# `sbx policy allow network --sandbox <name> <host>`; see the kit README.
caps:
  network:
    allow:
      - app.band.ai
      - pypi.org
      - files.pythonhosted.org

# Credential injection is NOT declared here — it is provisioned host-side, per
# deployment, so the operator controls which Band host is targeted (prod
# `app.band.ai`, staging, self-hosted, …) rather than the
# kit baking one in:
#
#   sbx secret set-custom -g --host '**.band.ai' \
#     --env BAND_API_KEY --placeholder proxy-managed --value <band-key>
#
# The VM then holds only the sentinel; the proxy supplies the real key on the
# wire (verified: the Band host presents an "O=Docker Sandboxes" MITM cert). A
# `**.band.ai` wildcard follows whichever Band deployment `BAND_REST_URL` points
# at. LLM provider keys are built-in sbx services — `sbx secret set -g <provider>`
# (anthropic, openai, …). See the README "Credential custody" section.
#
# A kit-declared `credentials[].apiKey.inject[]` block crashes `sbx create` on
# sbx 0.35.0 despite passing `sbx kit validate` (tracked upstream); host-side
# `set-custom` is the working, controllable path.

agentContext: |
  This workspace contains a Python agent launched by the Band Sandbox kit.
  Agent configuration is in band.yaml.
  Dependency changes must update both pyproject.toml and uv.lock.
  Add network access only for the LLM provider, repository host, or service
  this agent actually uses; see the kit README's "Network access" section.
  Never print or commit configured credentials.
