AWSTemplateFormatVersion: "2010-09-09"
Description: Thenvoi Bridge ECS Fargate service with AgentCore handler support

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the ECS service

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the ECS tasks (private recommended)

  ImageUri:
    Type: String
    Description: Docker image URI for the bridge container

  BridgeAgentsSecretArn:
    Type: String
    Description: >-
      Secrets Manager ARN for THENVOI_BRIDGE_AGENTS. The secret value is a
      JSON array of agent configs (agent_id, api_key, target). One secret
      per bridge deployment carries identities for all hosted agents.

  AwsRegion:
    Type: String
    Default: us-east-1
    Description: AWS region for AgentCore and CloudWatch

  KmsKeyArn:
    Type: String
    Default: ""
    Description: >-
      Optional KMS key ARN used to encrypt Secrets Manager secrets.
      Leave empty when using the default AWS-managed key (no extra
      permissions needed).  Set this when secrets are encrypted with
      a customer-managed KMS key so the execution role can decrypt them.

Conditions:
  HasKmsKey: !Not [!Equals [!Ref KmsKeyArn, ""]]

Resources:
  # ---------- Logging ----------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/thenvoi-bridge
      RetentionInDays: 30

  # ---------- IAM ----------
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      # RoleName intentionally omitted — CloudFormation generates a unique
      # name per stack, which prevents collisions when multiple stacks are
      # deployed in the same account (e.g. staging + production).
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # The double-colon (::aws:) is correct: region is empty (IAM is global)
        # and the account field is the "aws" pseudo-account for managed policies.
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: secrets-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref BridgeAgentsSecretArn
              - !If
                - HasKmsKey
                - Effect: Allow
                  Action:
                    - kms:Decrypt
                  Resource: !Ref KmsKeyArn
                - !Ref "AWS::NoValue"

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      # RoleName intentionally omitted — see ExecutionRole comment above.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: agentcore-invoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                # Wildcard because one bridge can invoke N runtime ARNs
                # (one per agent). Scope per-deployment by replacing the
                # wildcard with explicit ARNs if you need tighter IAM.
                Resource: !Sub "arn:aws:bedrock-agentcore:${AwsRegion}:${AWS::AccountId}:runtime/*"

  # ---------- Networking ----------
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Thenvoi Bridge ECS tasks - HTTPS egress only
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to Thenvoi platform, Bedrock AgentCore, and CloudWatch

  # ---------- ECS ----------
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: thenvoi-bridge

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: thenvoi-bridge
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: thenvoi-bridge
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          HealthCheck:
            Command:
              - CMD-SHELL
              - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 10
          Secrets:
            - Name: THENVOI_BRIDGE_AGENTS
              ValueFrom: !Ref BridgeAgentsSecretArn
          Environment:
            - Name: THENVOI_WS_URL
              Value: wss://app.thenvoi.com/api/v1/socket/websocket
            - Name: THENVOI_REST_URL
              Value: https://app.thenvoi.com
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AwsRegion
            - Name: HEALTH_HOST
              Value: "0.0.0.0"
            - Name: HEALTH_PORT
              Value: "8080"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AwsRegion
              awslogs-stream-prefix: bridge

  Service:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: thenvoi-bridge
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !GetAtt SecurityGroup.GroupId

Outputs:
  ClusterArn:
    Value: !GetAtt Cluster.Arn
  ServiceName:
    Value: !GetAtt Service.Name
  TaskDefinitionArn:
    Value: !Ref TaskDefinition
  LogGroupName:
    Value: !Ref LogGroup
